################################################################################
# General Configuration                                                        #
################################################################################
# Set the prefix key to C-a
set-option -g prefix C-a

# Reload the configuration file with prefix + r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g mouse on

# Set the default shell and terminal
set -g default-terminal "screen-256color"

# Start window and pane indices from 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Enable clipboard integration
set -g set-clipboard on
setw -g mode-keys vi

# Misc settings
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none
set -g renumber-windows on

################################################################################
# Theme                                                                        #
################################################################################
# Keep custom status bar/theme config in dotfiles, not inside downloaded plugins.
source-file ~/.config/tmux/theme.conf

################################################################################
# Keybindings                                                                  #
################################################################################
# Move between panes using vim-style keys
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U

bind-key -r f run-shell "tmux neww tms"

################################################################################
# Plugins                                                                      #
################################################################################
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Initialize TMUX Plugin Manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
